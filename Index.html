<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17070d">
  <title>YZ 770 Jewelry — Love Edit</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#17070d}
    iframe{display:block;width:100%;height:100%;border:0;background:#17070d}
    #loading{position:fixed;inset:0;z-index:5;display:grid;place-items:center;background:#17070d;color:#f6efe5;font:600 18px system-ui;letter-spacing:.12em;transition:opacity .45s ease}
    #loading.hide{opacity:0;pointer-events:none}
  </style>
</head>
<body>
  <div id="loading">YZ 770 JEWELRY</div>
  <iframe id="site" title="YZ 770 Jewelry" src="https://raw.githack.com/yarinc053-blip/770-jewelry-/f5309da285437b465e38d43e983ad9a62d3f0b50/Index.html"></iframe>
  <script>
    const frame=document.getElementById('site');
    const loading=document.getElementById('loading');
    function stabilize(){
      try{
        const d=frame.contentDocument;
        if(!d||!d.head)return;
        const style=d.createElement('style');
        style.textContent=`
          @media (max-width:900px),(pointer:coarse){
            .topbar,.topbar.is-scrolled{position:absolute!important;height:72px!important;background:linear-gradient(180deg,rgba(23,7,13,.98),rgba(23,7,13,.88) 74%,transparent)!important;-webkit-backdrop-filter:none!important;backdrop-filter:none!important;box-shadow:none!important;border-color:transparent!important;transform:none!important;contain:layout paint!important;isolation:isolate!important}
            .scroll-progress,.section-sheen,.cursor-glow{display:none!important}
            [data-parallax],.hero__visual,.hero__visual img,.manifesto__orb,.manifesto__orb img,.cinema__media,.cinema__media img,.product,.product__image img,.gallery-strip img,.finale__jewel,.trust__grid article{transform:none!important;will-change:auto!important}
            .product,.trust__grid article{opacity:1!important}
            .hero__brand-badge{background:rgba(23,7,13,.78)!important;-webkit-backdrop-filter:none!important;backdrop-filter:none!important;box-shadow:0 14px 32px rgba(0,0,0,.32)!important}
          }
        `;
        d.head.appendChild(style);
        loading.classList.add('hide');
      }catch(e){loading.classList.add('hide')}
    }
    frame.addEventListener('load',()=>{stabilize();setTimeout(stabilize,700);setTimeout(stabilize,1800)});
    setTimeout(()=>loading.classList.add('hide'),4500);
  </script>
</body>
</html>
